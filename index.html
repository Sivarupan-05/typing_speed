<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speed Typing Test</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="speedTypingTest" class="main-container">
        <div class="card-box">
            <h1 class="title">Speed Typing Test</h1>

            <!-- Spinner -->
            <div id="spinnerContainer" class="d-flex justify-content-center my-4">
                <div class="spinner-border text-purple" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>

            <div id="content" class="d-none">
                
                <div class="timer-row">
                    <img src="https://assets.ccbp.in/frontend/dynamic-webapps/clock-img.png" alt="clock" class="clock-img" />
                    <p id="timer" class="timer-text">0 s</p>
                </div>

                
                <div class="quote-box">
                    <p id="quoteDisplay" class="quote-text"></p>
                </div>

                
                <textarea id="quoteInput" class="quote-input" placeholder="Start typing here..." rows="4"></textarea>

              
                <p id="result" class="result-text"></p>

                
                <div class="btn-row">
                    <button id="submitBtn" class="btn-submit">Submit</button>
                    <button id="resetBtn" class="btn-reset">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
